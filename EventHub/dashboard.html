<!DOCTYPE html>
<html>
<head>

<title>EventHub Admin</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/teacher.css">

</head>

<body>

<div class="dashboard">

<!-- SIDEBAR -->

<div class="sidebar">

<h2>EventHub Admin</h2>
<p class="admin-email">admin@schoolhub.local</p>

<ul class="sidebar-menu">
<li class="active">Events</li>
<li>Participants</li>
</ul>

<button class="logout-btn" onclick="logout()">Logout</button>

</div>


<!-- MAIN CONTENT -->

<div class="dashboard-main">

<div class="top-bar">

<h1>Manage Events</h1>

<button class="add-btn" onclick="openAddEvent()">Add Event</button>
</div>


<div class="events-container" id="eventsContainer">
</div>

</div>

</div>


<!-- 🔴 MODAL -->
<div class="modal" id="eventModal">
  <div class="modal-content">

    <h2 id="modalTitle">Add Event</h2>

    <label>Event Name</label>
    <input id="eventName" type="text">

    <label>Description</label>
    <textarea id="eventDesc"></textarea>

    <div style="display:flex; gap:10px;">
      <div style="flex:1;">
        <label>Category</label>
        <select id="eventCategory">
          <option>Sports</option>
          <option>Cultural</option>
          <option>Academic</option>
        </select>
      </div>

      <div style="flex:1;">
        <label>Status</label>
        <select id="eventStatus">
          <option>Upcoming</option>
          <option>Ongoing</option>
          <option>Completed</option>
        </select>
      </div>
    </div>

    <div style="display:flex; gap:10px;">
      <div style="flex:1;">
        <label>Max Participants</label>
        <input id="eventSeats" type="number">
      </div>

      <div style="flex:1;">
        <label>Venue</label>
        <input id="eventVenue" type="text">
      </div>
    </div>

    <div style="display:flex; gap:10px;">
      <div style="flex:1;">
        <label>Date</label>
        <input id="eventDate" type="date">
      </div>

      <div style="flex:1;">
        <label>Time</label>
        <input id="eventTime" type="time">
      </div>
    </div>

    <label>Event Image</label>
    <input id="eventImageURL" type="text" placeholder="Paste Image URL (optional)">
    <p style="text-align:center; margin:10px 0;">OR</p>
    <input id="eventImageFile" type="file">

    <button onclick="saveEvent()" class="add-btn" style="margin-top:15px;">
      Save Event
    </button>

  </div>
</div>

<script src="js/teacher.js"></script>
<!-- Firebase SDK (modern version) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // 🔴 PASTE YOUR CONFIG HERE
  const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Make db global
  window.db = db;
  window.firebaseFns = { collection, addDoc, getDocs, deleteDoc, doc, updateDoc };
</script>
<script>

/* 🔴 DATA */
let events = [];
let eventIds = []; // store Firebase document IDs
let editIndex = -1;

/* OPEN ADD */
function openAddEvent() {
  document.getElementById("eventModal").style.display = "flex";
  document.getElementById("modalTitle").innerText = "Add Event";
  clearForm();
  editIndex = -1;
}

/* OPEN EDIT */
function openEditEvent(index) {
  const e = events[index];

  document.getElementById("eventModal").style.display = "flex";
  document.getElementById("modalTitle").innerText = "Edit Event";

  document.getElementById("eventName").value = e.name;
  document.getElementById("eventDesc").value = e.desc;
  document.getElementById("eventCategory").value = e.category;
  document.getElementById("eventStatus").value = e.status;
  document.getElementById("eventSeats").value = e.seats;
  document.getElementById("eventVenue").value = e.venue;
  document.getElementById("eventDate").value = e.date;
  document.getElementById("eventTime").value = e.time;
  document.getElementById("eventImageURL").value = e.image;

  editIndex = index;
}

/* CLOSE MODAL */
window.onclick = function(e){
  if(e.target.id === "eventModal"){
    document.getElementById("eventModal").style.display = "none";
  }
}

/* CLEAR */
function clearForm() {
  document.getElementById("eventName").value = "";
  document.getElementById("eventDesc").value = "";
  document.getElementById("eventCategory").value = "";
  document.getElementById("eventStatus").value = "";
  document.getElementById("eventSeats").value = "";
  document.getElementById("eventVenue").value = "";
  document.getElementById("eventDate").value = "";
  document.getElementById("eventTime").value = "";
  document.getElementById("eventImageURL").value = "";
  document.getElementById("eventImageFile").value = "";
}

/* SAVE */
async function saveEvent() {

  const { collection, addDoc, updateDoc, doc } = window.firebaseFns;

  const imageURL = document.getElementById("eventImageURL").value;
  const imageFile = document.getElementById("eventImageFile").files[0];

  let finalImage = "";

  if (imageURL) {
    finalImage = imageURL;
  } else if (imageFile) {
    finalImage = URL.createObjectURL(imageFile);
  }

  const event = {
    name: document.getElementById("eventName").value,
    desc: document.getElementById("eventDesc").value,
    category: document.getElementById("eventCategory").value,
    status: document.getElementById("eventStatus").value,
    seats: document.getElementById("eventSeats").value,
    venue: document.getElementById("eventVenue").value,
    date: document.getElementById("eventDate").value,
    time: document.getElementById("eventTime").value,
    image: finalImage
  };

  if (editIndex === -1) {
    await addDoc(collection(window.db, "events"), event);
  } else {
    const id = eventIds[editIndex];
    await updateDoc(doc(window.db, "events", id), event);
  }

  document.getElementById("eventModal").style.display = "none";
  loadEvents();
}

/* DELETE */
async function deleteEvent(index) {

  const { deleteDoc, doc } = window.firebaseFns;

  const id = eventIds[index];

  await deleteDoc(doc(window.db, "events", id));

  loadEvents();
}
/* RENDER */
function renderEvents() {

  const container = document.getElementById("eventsContainer");
  container.innerHTML = "";

  events.forEach((e, i) => {

    container.innerHTML += `
    <div class="admin-event-card">

      <img src="${e.image || 'https://via.placeholder.com/150'}">

      <div class="event-info">
        <h3>${e.name}</h3>
        <p>${e.desc}</p>
        <span>${e.category} · ${e.seats} · ${e.status}</span>
      </div>

      <div class="event-actions">
        <button class="edit" onclick="openEditEvent(${i})">Edit</button>
        <button class="delete" onclick="deleteEvent(${i})">Delete</button>
      </div>

    </div>
    `;
  });
}
async function loadEvents() {

  const { collection, getDocs } = window.firebaseFns;

  const snapshot = await getDocs(collection(window.db, "events"));

  events = [];
  eventIds = [];

  snapshot.forEach(docSnap => {
    events.push(docSnap.data());
    eventIds.push(docSnap.id);
  });

  renderEvents();
}
loadEvents();
</script>

</body>
</html>
