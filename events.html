<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Events | EventHub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/student.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-inner">
    <div class="logo">School <span>EventHub</span></div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="events.html" class="active">Events</a></li>
      <li><a href="admin/login.html">Admin</a></li>
    </ul>
  </div>
</div>

<div class="main">
  <div class="events-page-header">
    <h1>School Events</h1>
    <p>Browse upcoming, ongoing, and completed events. Use filters to quickly find what matters.</p>
  </div>

  <!-- FILTERS -->
  <div class="filters-row">
    <input type="text" id="searchInput" placeholder="ðŸ” Search by event or organizer" class="search-input" oninput="filterEvents()">
    <select id="statusFilter" onchange="filterEvents()" class="filter-select">
      <option value="">All Statuses</option>
      <option value="Upcoming">Upcoming</option>
      <option value="Ongoing">Ongoing</option>
      <option value="Completed">Completed</option>
    </select>
    <select id="categoryFilter" onchange="filterEvents()" class="filter-select">
      <option value="">All Categories</option>
      <option value="Sports">Sports</option>
      <option value="Cultural">Cultural</option>
      <option value="Academic">Academic</option>
      <option value="Literary">Literary</option>
      <option value="Commerce">Commerce</option>
      <option value="Science">Science</option>
      <option value="Humanities">Humanities</option>
    </select>
  </div>

  <div class="events-grid" id="eventsGrid">
    <p class="loading-text">Loading events...</p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDMkDxml0p9zUp6gZuo1SeVhmQ3BZamy9o",
    authDomain: "eventhub-8a8dc.firebaseapp.com",
    projectId: "eventhub-8a8dc",
    storageBucket: "eventhub-8a8dc.firebasestorage.app",
    messagingSenderId: "450946542344",
    appId: "1:450946542344:web:e54c332ca5bf2358d01abd"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  window._allEvents = [];

  async function loadEvents() {
    const grid = document.getElementById("eventsGrid");
    try {
      const snapshot = await getDocs(collection(db, "events"));
      window._allEvents = [];
      snapshot.forEach(doc => window._allEvents.push({ id: doc.id, ...doc.data() }));
      renderEvents(window._allEvents);
    } catch (err) {
      console.error(err);
      grid.innerHTML = '<p class="loading-text">Failed to load events.</p>';
    }
  }

  window.filterEvents = () => {
    const search = document.getElementById("searchInput").value.toLowerCase();
    const status = document.getElementById("statusFilter").value;
    const category = document.getElementById("categoryFilter").value;

    let filtered = window._allEvents.filter(e => {
      const matchSearch = e.name?.toLowerCase().includes(search) || e.organizer?.toLowerCase().includes(search);
      const matchStatus = !status || e.status === status;
      const matchCategory = !category || e.category === category;
      return matchSearch && matchStatus && matchCategory;
    });

    renderEvents(filtered);
  };

  function renderEvents(list) {
    const grid = document.getElementById("eventsGrid");
    if (list.length === 0) {
      grid.innerHTML = '<p class="loading-text">No events found.</p>';
      return;
    }

    grid.innerHTML = list.map(e => {
      const regDeadline = e.regDeadline ? new Date(e.regDeadline).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) : "â€”";
      const eventDate = e.eventDate ? new Date(e.eventDate).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) : "â€”";
      const current = e.joined || 0;
      const max = e.seats || "â€”";
      const isClosed = e.status === "Completed" || (e.regDeadline && new Date(e.regDeadline) < new Date());
      const statusClass = e.status === "Ongoing" ? "badge-ongoing" : e.status === "Completed" ? "badge-completed" : "badge-upcoming";

      return `
      <div class="event-card">
        <div class="event-card-img">
          <img src="${e.image || 'https://via.placeholder.com/400x200'}" alt="${e.name}">
          <span class="badge ${statusClass}">${(e.status || "").toLowerCase()}</span>
        </div>
        <div class="event-card-body">
          <h3>${e.name}</h3>
          <div class="event-meta">
            <span>ðŸ“… ${eventDate}</span>
            <span>â° Deadline: ${regDeadline}</span>
            <span>ðŸ‘¥ ${current}/${max} participants</span>
            ${e.venue ? `<span>ðŸ“ ${e.venue}</span>` : ""}
          </div>
          <div class="event-card-actions">
            ${isClosed
              ? `<button class="register-btn closed" disabled>Registration Closed</button>`
              : `<button class="register-btn" onclick="alert('Registration coming soon!')">Register</button>`
            }
            <button class="details-btn" onclick="alert('Details coming soon!')">View Details</button>
          </div>
        </div>
      </div>`;
    }).join("");
  }

  loadEvents();
</script>

</body>
</html>
