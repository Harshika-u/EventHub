<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login | EventHub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/student.css">
</head>
<body class="login-page">

<div class="login-wrapper">
  <div class="login-card">
    <div class="login-logo">School <span>EventHub</span></div>
    <h2>Student Login</h2>
    <p class="login-sub">Use your school email to sign in</p>

    <div id="errorMessage" class="error-msg"></div>

    <label>Email</label>
    <input type="email" id="loginEmail" placeholder="name@jgsicse.org" required>

    <label>Password</label>
    <input type="password" id="loginPassword" placeholder="Enter password" required>

    <button class="login-btn" onclick="handleLogin()">Login</button>

    <p class="admin-link">Are you a teacher? <a href="admin/login.html">Admin Login</a></p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDMkDxml0p9zUp6gZuo1SeVhmQ3BZamy9o",
    authDomain: "eventhub-8a8dc.firebaseapp.com",
    projectId: "eventhub-8a8dc",
    storageBucket: "eventhub-8a8dc.firebasestorage.app",
    messagingSenderId: "450946542344",
    appId: "1:450946542344:web:e54c332ca5bf2358d01abd"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  window._auth = auth;
  window._signIn = signInWithEmailAndPassword;

  window.handleLogin = async () => {
    const email = document.getElementById("loginEmail").value.trim();
    const pass = document.getElementById("loginPassword").value;
    const errorDiv = document.getElementById("errorMessage");
    errorDiv.style.display = "none";

    if (!email || !pass) {
      errorDiv.innerText = "Please fill in all fields.";
      errorDiv.style.display = "block";
      return;
    }

    // Temporary test login
    if (email === "student@test.com" && pass === "123456") {
      localStorage.setItem("student", "true");
      window.location.href = "index.html";
      return;
    }

    try {
      await window._signIn(window._auth, email, pass);
      localStorage.setItem("student", "true");
      window.location.href = "index.html";
    } catch (error) {
      errorDiv.innerText = "Invalid email or password.";
      errorDiv.style.display = "block";
    }
  };
</script>

</body>
</html>
